<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="SalesRegistration.css">
</head>
<body>
    <div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="#">Dashboard</a>
        <a href="SalesRegistration.html">Sales Registration</a>
        <a href="SuppliersRegistration.html">Suppliers Registration</a>
    </div>


    <!-- Main Content -->
    <div class="content">

        <h1>Sales Registration</h1>

        <form class="sales-form">

            <!-- Sales Details -->
            <div class="form-group">
                <label for="sales-date">Sales Date</label>
                <input type="date" id="sales-date">
            </div>

            <div class="form-group">
                <label for="sales-person">Sales Person</label>
                <select id="sales-person">
                    <option>Select representative</option>
                    <option>Rose Nakazibwe</option>
                    <option>Kintu Cathy</option>
                    <option>Dinah Denise</option>
                </select>
            </div>


            <!-- Customer Details -->
            <h2>Customer Details</h2>

            <div class="form-group">
                <label for="customer-name">Name</label>
                <input type="text" id="customer-name" placeholder="Enter fullname">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter phone number">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email">
            </div>

            <div class="form-group">
                <label for="type">Customer Type</label>
                <select id="type">
                    <option>Select type</option>
                    <option>New Customer</option>
                    <option>Old Customer</option>
                </select>
            </div>


            <!-- Items -->
            <h3>Items</h3>

            <div class="form-group">
                <label for="product-id">Product ID</label>
                <input type="number" id="product-id">
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity">
            </div>

            <div class="form-group">
                <label for="price">Unit Price</label>
                <input type="number" id="price">
            </div>
             <div class="form-group">
                <label for="product-id">Product ID</label>
                <input type="number" id="product-id">
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity">
            </div>

            <div class="form-group">
                <label for="price">Unit Price</label>
                <input type="number" id="price">
            </div>




            <!-- Buttons -->
            <div class="button-group">
                <button type="reset">Cancel</button>
                <button type="submit">Submit</button>
            </div>

        </form>

    </div>

</div>
    
</body>
</html>
